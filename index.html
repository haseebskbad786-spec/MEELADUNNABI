<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meeladunnabi Result System</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

h1{
text-align:center;
color:#0d6efd;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#0d6efd;
color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>MEELADUNNABI RESULT SYSTEM</h1>

<h3>Add Participant</h3>

<input type="text" id="name" placeholder="Candidate Name">

<select id="team">
<option>A Team</option>
<option>B Team</option>
<option>C Team</option>
<option>IVA Team</option>
</select>

<button onclick="addParticipant()">Add Participant</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Team</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

<script>

let participants=[];

function addParticipant(){

let name=document.getElementById("name").value;
let team=document.getElementById("team").value;

if(name==""){
alert("Enter Name");
return;
}

participants.push({
name:name,
team:team
});

display();

document.getElementById("name").value="";
}

function display(){

let html="";

participants.forEach(function(p){

html+=`
<tr>
<td>${p.name}</td>
<td>${p.team}</td>
</tr>
`;

});

document.getElementById("list").innerHTML=html;
}

</script>

</body>
</html>
